services:
  grafana:
    container_name: 'openobserve'
    build:
      context: ./.config
      args:
        grafana_version: ${GRAFANA_VERSION:-12.4}
        grafana_image: ${GRAFANA_IMAGE:-docker.io/grafana/grafana}
    ports:
      - ${GRAFANA_PORT:-3000}:3000/tcp
    environment:
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: ${GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS:-openobserve}
    volumes:
      - ./dist:/var/lib/grafana/plugins/openobserve
      - ./provisioning:/etc/grafana/provisioning
